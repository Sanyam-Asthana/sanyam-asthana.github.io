            <nav id="sidebar">
                <p><span class="nerd-icon"> </span>SACode</p>
                <ul>
                    <li><a href="index.html"><span class="nerd-icon md-icon"> </span>index.md</a></li>
                    <li><a href="about.html"><span class="nerd-icon md-icon"> </span>about.md</a></li>
                    <li><a href="projects.html"><span class="nerd-icon md-icon"> </span>projects.md</a></li>

            <section id="content">
                <div id="file-tab-bar">
                    <div id="navigation-arrows">
                        <span class="nerd-icon"></span>
                        <span class="nerd-icon"></span>
                    </div>
                    <div class="file-tab">

                    <div class="file-tab file-tab-focused">
                        <a href="contact.html">contact.md</a>
                    </div>
                </div>

                <article id="text" spellcheck="false">
                    <dialog id="submit-popup">
                        Message Sent!
                    </dialog>

                    <h2 class="green"><span class="dim">#</span>Contact Me</h2>

                    <form>
                        <div class="form-field">
                            <label for="email">Email:</label>
                            <input type="text" id="email" name="email" placeholder="someone@example.com">
                        </div>

                        <div class="form-field">
                            <label for="subject">Subject:</label>
                            <input type="text" id="subject" name="subject" placeholder="Enter subject">
                        </div>

                        <div class="form-field">
                            <label for="message">Message:</label>
                            <textarea id="message" name="message" placeholder="Enter message"></textarea>
                        </div>

                        <span id="error-msg" class="red"></span>

                        <button type="submit" id="submit-button">Submit</button>
                    </form>

                </article>

                <section id="terminal">
                    <div id="terminal-tab-bar">
                        <div class="terminal-tab">
                            SACode - shell
                        </div>
                    </div>
                    <div id="terminal-content">
                        <span class="green">Press 'J' to toggle terminal</span><br>
                        <br>

                        <div class="prompt">
                            <label for="terminal-input" class="blue">shell$</label>
                            <input type="text" id="terminal-input" spellcheck="false">
                        </div>
                    </div>
                </section>
            </section>
        </main>

        <footer>

                    </div>

                        <span class="nerd-icon" id="switch-theme" role="button" tabindex="0" aria-label="Toggle Theme" aria-controls="page-body"></span>
                    </div>
                </div>
            </div>
